name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Necesario para pushear la rama gh-pages
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE_PATH: /memorable-summaries/

      - name: Verificar build de producción
        run: |
          if grep -q 'src/main.ts' dist/index.html; then
            echo "::error::dist/index.html apunta a src/main.ts (build incorrecto)"
            exit 1
          fi
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Publicar en rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
